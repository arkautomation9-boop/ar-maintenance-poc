name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build AR Maintenance APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─── 1. Checkout code ───────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Set up Node.js ──────────────────────────────────────
      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ─── 3. Install Capacitor dependencies ──────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ─── 4. Set up Java 17 (required by Android Gradle) ─────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ─── 5. Set up Android SDK ───────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ─── 6. Create app icons (using Python) ──────────────────────
      - name: Generate app icons
        run: |
          python3 -c "
          import os, struct, zlib
          os.makedirs('icons', exist_ok=True)
          def make_png(size, bg=(13,17,23), fg=(0,212,255)):
              w=h=size
              raw=[]
              for y in range(h):
                  row=b'\x00'
                  for x in range(w):
                      cx,cy=x-w//2,y-h//2
                      r=w*0.35
                      if cx*cx+cy*cy<=r*r:
                          row+=bytes([fg[0],fg[1],fg[2],255])
                      else:
                          row+=bytes([bg[0],bg[1],bg[2],255])
                  raw.append(row)
              def chunk(t,d):
                  c=zlib.crc32(t+d)&0xffffffff
                  return struct.pack('>I',len(d))+t+d+struct.pack('>I',c)
              idat=zlib.compress(b''.join(raw))
              return (b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',struct.pack('>IIBBBBB',w,h,8,2,0,0,0))
                      +chunk(b'IDAT',idat)+chunk(b'IEND',b''))
          open('icons/icon-192.png','wb').write(make_png(192))
          open('icons/icon-512.png','wb').write(make_png(512))
          print('Icons created')
          "

      # ─── 7. Add Android platform ─────────────────────────────────
      - name: Add Android platform (Capacitor)
        run: |
          npx cap add android || echo "Android platform already exists"

      # ─── 8. Sync web assets to Android ───────────────────────────
      - name: Sync web assets into Android project
        run: npx cap sync android

      # ─── 9. Patch AndroidManifest for camera + internet ──────────
      - name: Patch AndroidManifest.xml permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Ensure camera and internet permissions exist
          if ! grep -q 'CAMERA' "$MANIFEST"; then
            sed -i 's|<uses-permission android:name="android.permission.INTERNET"|<uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.INTERNET"|' "$MANIFEST"
          fi
          # Add usesCleartextTraffic for local MQTT connections
          sed -i 's|android:label=|android:usesCleartextTraffic="true"\n        android:label=|' "$MANIFEST" || true
          echo "Manifest patched"
          cat "$MANIFEST"

      # ─── 10. Make gradlew executable ─────────────────────────────
      - name: Set Gradle wrapper permissions
        run: chmod +x android/gradlew

      # ─── 11. Build debug APK ─────────────────────────────────────
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ─── 12. Find and rename APK ─────────────────────────────────
      - name: Locate APK
        run: |
          find android -name "*.apk" -type f
          APK=$(find android -name "*debug*.apk" | head -1)
          cp "$APK" AR_Maintenance_POC.apk
          echo "APK_PATH=AR_Maintenance_POC.apk" >> $GITHUB_ENV
          echo "APK size: $(du -sh AR_Maintenance_POC.apk | cut -f1)"

      # ─── 13. Upload APK as artifact ───────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AR-Maintenance-POC-APK
          path: AR_Maintenance_POC.apk
          retention-days: 30

      # ─── 14. Summary ─────────────────────────────────────────────
      - name: Build summary
        run: |
          echo "## ✅ APK Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Detail |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| App | AR Maintenance POC |" >> $GITHUB_STEP_SUMMARY
          echo "| Package | com.armaintenance.poc |" >> $GITHUB_STEP_SUMMARY
          echo "| Type | Debug APK |" >> $GITHUB_STEP_SUMMARY
          echo "| Size | $(du -sh AR_Maintenance_POC.apk | cut -f1) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download the **AR-Maintenance-POC-APK** artifact above to install on your Android tablet." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Install Instructions" >> $GITHUB_STEP_SUMMARY
          echo "1. Transfer \`AR_Maintenance_POC.apk\` to Android tablet" >> $GITHUB_STEP_SUMMARY
          echo "2. Enable *Install from unknown sources* in Android Settings → Security" >> $GITHUB_STEP_SUMMARY
          echo "3. Tap the APK file to install" >> $GITHUB_STEP_SUMMARY
          echo "4. Open the app and grant Camera permission" >> $GITHUB_STEP_SUMMARY
